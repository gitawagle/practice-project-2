<html>
    <body>
        <p>
            Hello
        </p>
        <button onclick="myFunction()">Click Me for a random number</button>

        <script>
            function myFunction(){
                fetch('/random-number')
                .then(response => response.json())
                .then(data => {
                document.getElementById('result').innerText = data.random_number;
            })
        }
        </script>

        <p id="result">  </p>
    </body>
</html>
